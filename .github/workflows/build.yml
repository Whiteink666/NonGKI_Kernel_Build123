name: Build DIY SukiSU Kernel for K40 Pro (Haydn)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置编译环境 (已修复 GCC 依赖)
        run: |
          sudo apt-get update
          # 新增了 gcc-aarch64-linux-gnu 和 gcc-arm-linux-gnueabi 解决编译器找不到的报错
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip python3 python2

      - name: 下载 Proton-Clang 工具链
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

      - name: 下载 K40 Pro (Haydn) 内核源码 (AGNi 定制版)
        run: |
          git clone --depth=1 https://github.com/psndna88/AGNi_pureMIUI.git kernel_workspace

      - name: 注入 SukiSU Ultra (SKSU)
        run: |
          cd kernel_workspace
          curl -LSs "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" | bash -

      - name: 编译内核并注入 DIY 名字 (已修复 defconfig 找不到问题)
        run: |
          cd kernel_workspace
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          # 【智能修复】：自动探测大佬设定的配置文件名 (涵盖 haydn, lahaina, sm8350 等常见命名)
          DEFCONFIG_FULL_PATH=$(find arch/arm64/configs -name "*haydn*defconfig" -o -name "*lahaina*qgki*defconfig" -o -name "*sm8350*defconfig" | head -n 1)
          DEFCONFIG_NAME=${DEFCONFIG_FULL_PATH#arch/arm64/configs/}
          echo "==== 成功找到配置文件: $DEFCONFIG_NAME ===="
          
          # 生成基础配置 (使用自动找到的文件名)
          make O=out $DEFCONFIG_NAME
          
          # 【DIY 魔法】：修改内核名称 (记得在这里改成你想要的名字哦)
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-My_DIY_SukiSU"/g' out/.config
          
          # 开始满血多线程编译
          make -j$(nproc --all) O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image dtb.img dtbo.img

      - name: 打包 AnyKernel3 刷机包
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel_workspace/out/arch/arm64/boot/Image AnyKernel3/
          cp kernel_workspace/out/arch/arm64/boot/dts/vendor/qcom/*.dtb AnyKernel3/dtb || true
          cp kernel_workspace/out/arch/arm64/boot/dtbo.img AnyKernel3/ || true
          
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=DIY SKSU Ultra Kernel for Haydn/' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=haydn/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=K40 Pro/' anykernel.sh
          
          zip -r9 ../DIY-SukiSU-Haydn-Kernel.zip * -x .git README.md *placeholder

      - name: 上传编译好的刷机包
        uses: actions/upload-artifact@v4
        with:
          name: DIY-SukiSU-Haydn-Kernel
          path: DIY-SukiSU-Haydn-Kernel.zip
