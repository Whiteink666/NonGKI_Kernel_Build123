name: Build SukiSU Ultra for K40 Pro (MIUI 14)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip python3 python2

      - name: 下载 Proton-Clang 工具链
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

      - name: 下载 K40 Pro (Haydn) 内核源码
        run: |
          # 这里默认使用了小米官方开源的 Android 13 / MIUI 14 分支 (haydn-t-oss)
          # 如果你有自己心仪的、大佬专门优化过的源码链接，直接替换下面这个 GitHub 地址和分支名即可
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b haydn-t-oss kernel_workspace

      - name: 注入 SukiSU Ultra (SKSU)
        run: |
          cd kernel_workspace
          # SukiSU Ultra 官方的集成脚本
          curl -LSs "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" | bash -

      - name: 编译内核
        run: |
          cd kernel_workspace
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          # 生成 K40 Pro 的配置文件
          make O=out vendor/haydn_defconfig
          
          # 开始多线程满血编译
          make -j$(nproc --all) O=out CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image dtb.img dtbo.img

      - name: 打包 AnyKernel3 刷机包
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp kernel_workspace/out/arch/arm64/boot/Image AnyKernel3/
          cp kernel_workspace/out/arch/arm64/boot/dts/vendor/qcom/haydn*.dtb AnyKernel3/dtb || true
          cp kernel_workspace/out/arch/arm64/boot/dtbo.img AnyKernel3/ || true
          
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SKSU Ultra Kernel for Haydn/' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=haydn/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=K40 Pro/' anykernel.sh
          
          zip -r9 ../SukiSU-Haydn-Kernel.zip * -x .git README.md *placeholder

      - name: 上传编译好的刷机包
        uses: actions/upload-artifact@v4
        with:
          name: SukiSU-Haydn-MIUI14-Kernel
          path: SukiSU-Haydn-Kernel.zip
